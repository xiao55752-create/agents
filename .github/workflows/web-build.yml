name: Web build

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - 'package-lock.json'
  pull_request:
    paths:
      - 'apps/web/**'
      - 'packages/shared/**'
      - 'package-lock.json'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build -w @agentos/shared
      - run: npm run build -w @agentos/web
